<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2b8a57">
    <meta name="description" content="Convert JPG images to PDF files locally in your browser">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JPG→PDF">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
    <title>JPG to PDF Converter</title>
</head>
<body>
    <div class="app-shell">
        <header class="app-header panel">
            <div class="brand-copy">
                <p class="eyebrow" id="appEyebrow"></p>
                <h1 id="titleText"></h1>
                <p class="subtitle" id="appSubtitle"></p>
            </div>

            <div class="header-actions">
                <label class="select-wrap" for="langSelect">
                    <span class="sr-only" id="langLabelText"></span>
                    <select id="langSelect" aria-labelledby="langLabelText"></select>
                </label>
                <button class="icon-button" id="guideBtn" type="button" aria-haspopup="dialog">?</button>
                <button class="secondary-button install-button" id="installBtn" type="button" hidden></button>
            </div>
        </header>

        <div class="status-stack">
            <div class="status-banner is-hidden" id="networkBanner" role="status" aria-live="polite"></div>
            <div class="status-banner is-hidden" id="appBanner" role="status" aria-live="polite">
                <span id="appBannerText"></span>
                <button id="appBannerAction" type="button" hidden></button>
            </div>
        </div>

        <main class="workspace-grid">
            <section class="panel workspace-main" id="workspaceMain">
                <div class="panel-head">
                    <div>
                        <p class="section-kicker" id="workspaceKicker"></p>
                        <h2 class="section-title" id="dropTitle"></h2>
                    </div>
                    <p class="section-copy" id="dropDescription"></p>
                </div>

                <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-describedby="dropHint">
                    <div class="drop-illustration" aria-hidden="true">
                        <svg viewBox="0 0 180 132" role="presentation">
                            <defs>
                                <linearGradient id="dropBackCard" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#edf7ef"/>
                                    <stop offset="100%" stop-color="#dfeee3"/>
                                </linearGradient>
                                <linearGradient id="dropFrontCard" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ffffff"/>
                                    <stop offset="100%" stop-color="#f0f7f2"/>
                                </linearGradient>
                            </defs>
                            <rect x="44" y="24" width="88" height="88" rx="24" fill="url(#dropBackCard)" opacity="0.68"/>
                            <rect x="56" y="18" width="88" height="88" rx="24" fill="url(#dropFrontCard)" stroke="#cfe4d3" stroke-width="2"/>
                            <rect x="73" y="48" width="54" height="34" rx="10" fill="#ebf7ee"/>
                            <circle cx="86" cy="58" r="5" fill="#f1b95f"/>
                            <path d="M77 75 L91 60 L100 68 L108 61 L123 75 Z" fill="#7fc999"/>
                            <path d="M77 75 L94 56 L105 66 L113 59 L127 75 Z" fill="#2b8a57"/>
                            <rect x="72" y="86" width="56" height="5" rx="2.5" fill="#d6e8db"/>
                            <rect x="80" y="95" width="40" height="5" rx="2.5" fill="#d6e8db"/>
                        </svg>
                    </div>
                    <p class="drop-hint" id="dropHint"></p>
                    <button class="secondary-button" id="chooseFilesBtn" type="button"></button>
                </div>
                <input type="file" id="fileInput" accept=".jpg,.jpeg,image/jpeg" multiple hidden>

                <div class="summary-strip is-hidden" id="selectionSummaryStrip">
                    <article class="summary-pill">
                        <span class="summary-label" id="selectedFilesLabel"></span>
                        <strong id="selectedFilesValue">0</strong>
                    </article>
                    <article class="summary-pill">
                        <span class="summary-label" id="selectedPagesLabel"></span>
                        <strong id="selectedPagesValue">0</strong>
                    </article>
                    <article class="summary-pill">
                        <span class="summary-label" id="selectedSizeLabel"></span>
                        <strong id="selectedSizeValue">0 B</strong>
                    </article>
                </div>

                <section class="selected-workspace is-hidden" id="selectedWorkspace">
                    <div class="selected-toolbar">
                        <div class="selected-toolbar-copy">
                            <h3 id="selectedTitle"></h3>
                            <p id="selectedHint"></p>
                        </div>

                        <div class="selected-toolbar-actions">
                            <button class="ghost-button" id="clearSelectionBtn" type="button"></button>
                            <button class="primary-button" id="convertButton" type="button"></button>
                        </div>
                    </div>

                    <div class="progress-wrap is-hidden" id="progressWrap" aria-live="polite">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p class="progress-label" id="progressLabel"></p>
                    </div>

                    <p class="conversion-status" id="conversionStatus"></p>

                    <ul class="selected-list" id="selectedList" aria-live="polite"></ul>
                </section>

                <section class="result-panel is-hidden" id="resultSection" aria-live="polite">
                    <div class="result-header">
                        <div>
                            <p class="section-kicker" id="resultKicker"></p>
                            <h3 id="resultTitle"></h3>
                            <p id="resultBody"></p>
                        </div>
                        <a class="primary-button result-download" id="resultDownload" href="#"></a>
                    </div>

                    <div class="result-meta" id="resultMeta"></div>

                    <div class="result-skipped is-hidden" id="resultSkippedWrap">
                        <p class="skipped-label" id="resultSkippedLabel"></p>
                        <p class="skipped-list" id="resultSkippedList"></p>
                    </div>
                </section>

                <div class="inline-alert is-hidden" id="inlineAlert" role="alert"></div>
            </section>

            <aside class="panel workspace-side">
                <div class="panel-head">
                    <div>
                        <p class="section-kicker" id="historyKicker"></p>
                        <h2 class="section-title" id="historyTitle"></h2>
                    </div>
                    <button class="ghost-button compact" id="clearHistoryBtn" type="button"></button>
                </div>

                <div class="storage-card">
                    <div class="storage-head">
                        <span id="storageLabel"></span>
                        <strong id="storageSummary"></strong>
                    </div>
                    <div class="storage-bar">
                        <div class="storage-fill" id="storageFill"></div>
                    </div>
                    <p class="storage-note" id="storageNote"></p>
                </div>

                <div class="history-controls">
                    <input id="historySearchInput" type="search">
                    <label class="select-wrap compact" for="historySortSelect">
                        <span class="sr-only" id="historySortLabel"></span>
                        <select id="historySortSelect" aria-labelledby="historySortLabel"></select>
                    </label>
                </div>

                <div class="history-notice is-hidden" id="historyNotice" role="status" aria-live="polite"></div>

                <ul class="history-list" id="historyList"></ul>
                <p class="history-empty" id="historyEmpty"></p>
            </aside>
        </main>
    </div>

    <div class="modal-overlay is-hidden" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <div class="modal-head">
                <h2 id="modalTitle"></h2>
                <button class="icon-button" id="modalCloseIcon" type="button" aria-label="Close">×</button>
            </div>
            <ol id="modalSteps"></ol>
            <button class="secondary-button full-width" id="modalClose" type="button"></button>
        </div>
    </div>

    <script src="./i18n.js"></script>
    <script src="./vendor/pdf-lib.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
